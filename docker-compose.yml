version: '3.8'

services:
  firebase:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ./backend/functions:/app
      - ./firebase:/firebase
    ports:
      - "5001:5001"
      - "8080:8080"
      - "8085:8085"
    command: |
      sh -c "
        npm install &&
        npx firebase emulators:start --project elevation-dev
      "

  app:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ./mobile:/app
      - /app/node_modules
    ports:
      - "19006:19006"
      - "19000:19000"
    command: |
      sh -c "
        npm install --legacy-peer-deps &&
        npx expo start --web
      "
    depends_on:
      - firebase